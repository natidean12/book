<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cosmic Bloom Library ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght=0,700;1,700&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmic Bloom">


  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    :root {
      --primary-rose: #fcaec1;      
      --soft-pink: #fbc8d4;         
      --vintage-gold: #cca05a;      
      --bg-overlay: rgba(58, 29, 33, 0.65); 
      --card-bg: rgba(255, 255, 255, 0.08); 
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
      --text-muted: #fbc8d4;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2, h3, .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--soft-pink); }

    .sidebar {
      width: 250px;
      background: rgba(58, 29, 33, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      position: fixed;
      height: 100vh;
      z-index: 1000;
      overflow-y: auto;
    }
    
    .nav-brand { font-size: 2.2rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px rgba(251, 200, 212, 0.3); }
    
    .nav-link {
      color: var(--text-light);
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 25px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .nav-link:hover { background: rgba(251, 200, 212, 0.1); }
    
    .nav-link.active {
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21;
      box-shadow: 0 8px 20px rgba(252, 174, 193, 0.3);
    }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; }
    
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 30px;
      position: sticky;
      top: 0;
      z-index: 900;
    }

    .back-years-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--card-border);
      color: var(--text-light);
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    
    .pages-badge {
      background: var(--vintage-gold);
      color: #3a1d21;
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 700;
      box-shadow: 0 6px 15px rgba(204, 160, 90, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    
    .stat-card small { color: var(--soft-pink); font-weight: 300; }
    .stat-card strong { font-size: 2.2rem; font-weight: 700; color: #ffffff; display: block; margin-top: 5px; }

    .year-header {
      font-size: 2.5rem;
      margin: 60px 0 30px;
      color: var(--soft-pink);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .year-header::after { content: ""; flex: 1; height: 1px; background: var(--card-border); }

    .books-grid {
      display: grid;
      gap: 30px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    .book-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 18px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(58, 29, 33, 0.25);
    }
    
    .book-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 16px;
      background: #4a2429;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .stars { color: var(--vintage-gold); margin-bottom: 12px; font-size: 1.2rem; }
    .half-star { position: relative; display: inline-block; color: rgba(255,255,255,0.2); }
    .half-star::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    .book-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      border-top: 1px solid var(--card-border);
      padding-top: 15px;
      flex-wrap: wrap;
    }
    
    .book-actions button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.05);
      width: 38px; height: 38px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-light);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    
    .book-actions button:active { background: rgba(255,255,255,0.25); }
    
    .read-pdf-btn {
      width: 100% !important;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose)) !important;
      color: #3a1d21 !important;
      font-weight: bold;
      font-size: 0.85rem;
      gap: 5px;
    }

    .del-btn.warning { background: #ff5252 !important; animation: pulse 0.6s infinite; }

    #addBtn {
      position: fixed; bottom: 40px; right: 40px;
      width: 65px; height: 65px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose));
      color: #3a1d21;
      font-size: 2.5rem;
      border: none;
      cursor: pointer;
      z-index: 1100;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(252, 174, 193, 0.4);
    }

    .modal {
      position: fixed; inset: 0;
      background: rgba(38, 19, 22, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s ease;
    }
    
    .modal.show { opacity: 1; visibility: visible; }
    
    .modal-content {
      background: rgba(58, 29, 33, 0.9);
      border: 1px solid var(--card-border);
      padding: 35px;
      border-radius: 32px;
      width: 90%; max-width: 450px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    input, select {
      width: 100%; padding: 16px; margin: 10px 0;
      border-radius: 18px;
      border: 1px solid var(--card-border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-light);
      font-size: 16px; 
      font-family: 'Poppins', sans-serif;
    }
    
    input::placeholder { color: rgba(255,255,255,0.4); }

    #starsSelect { text-align:center; font-size:3rem; margin:15px 0; user-select: none; }
    #starsSelect span { cursor:pointer; color: rgba(255,255,255,0.2); position: relative; display: inline-block; }
    #starsSelect span.selected { color: var(--vintage-gold); }
    #starsSelect span.half-selected::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    .modal-buttons { display: flex; gap: 10px; margin-top: 25px; }
    .modal-buttons button { flex: 1; padding: 16px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }
    #saveBook { background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose)); color: #3a1d21; }
    #closeModal { background: rgba(255,255,255,0.1); color: #fff; }

    /* Estilo do Leitor Otimizado para Gestos no iPad */
    .pdf-viewer {
      position: fixed; inset: 0; background: #1c0e10; z-index: 3000;
      display: none; flex-direction: column;
    }
    .pdf-viewer.show { display: flex; }
    .pdf-header { background: #12090a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); }
    .pdf-header button { background: linear-gradient(135deg, var(--soft-pink), var(--primary-rose)); color: #3a1d21; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    .pdf-container-scroller { flex: 1; width: 100%; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .pdf-page-canvas { max-width: 95%; width: 750px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: white; border-radius: 4px; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0; justify-content: space-around; }
      .nav-brand { display: none; }
      .nav-link { margin-bottom: 0; border-radius: 0; height: 100%; width: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
      .nav-link span { display: none; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .books-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
      #addBtn { bottom: 85px; right: 20px; }
    }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand" onclick="window.location.href='anos.html'" style="cursor:pointer;">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link active"><i>📚</i> <span>Livros</span></a>
    <a href="challenge.html" class="nav-link"><i>🏆</i> <span>Desafios</span></a>
    <a href="calendario.html" class="nav-link"><i>📅</i> <span>Agenda</span></a>
    <a href="favoritos.html" class="nav-link"><i>💜</i> <span>Favoritos</span></a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> <span>Bingo</span></a>
    <a href="cores.html" class="nav-link"><i>🌈</i> <span>Paleta</span></a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> <span>Desafio A-Z</span></a>
    <a href="roleta.html" class="nav-link"><i>📍</i> <span>Roleta</span></a>
  </nav>

  <main class="main-content">
    <div class="top-bar">
      <button class="back-years-btn" onclick="window.location.href='anos.html'">← Voltar aos Anos</button>
      <div class="pages-badge">✨ <span id="totalPgs">0</span> pgs lidas</div>
    </div>

    <div class="stats-container">
      <div class="stat-card"><small>Livros Lidos</small><strong id="stLido">0</strong></div>
      <div class="stat-card"><small>Lendo Agora</small><strong id="stLendo">0</strong></div>
      <div class="stat-card"><small>Favoritos</small><strong id="stFav">0</strong></div>
      <div class="stat-card"><small>Média Estrelas</small><strong id="stMedia">0.0</strong></div>
    </div>
    <div id="yearContainers"></div>
  </main>

  <button id="addBtn">＋</button>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Novo Registro Mágico</h2>
      <input type="file" id="bookFile" accept="image/*,application/pdf">
      <input type="text" id="inputTitle" placeholder="Título do Livro"> 
      <input type="number" id="inputPages" placeholder="Total de Páginas">
      <input type="number" id="inputYear" placeholder="Ano de Leitura" value="2026">
      <select id="statusSelect">
        <option value="lido">📕 Já li (Concluído)</option>
        <option value="lendo">📖 Lendo Agora</option>
        <option value="quero">📘 Quero Ler</option>
      </select>
      <div id="starsSelect">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
      <div class="modal-buttons">
        <button id="saveBook">✨ Salvar no Cosmos</button>
        <button id="closeModal">Voltar</button>
      </div>
    </div>
  </div>

  <div class="pdf-viewer" id="pdfViewer">
    <div class="pdf-header">
      <h3 id="pdfViewerTitle" style="margin:0; color:#fff; font-size:1.1rem;">Lendo Livro</h3>
      <button onclick="fecharLeitorPDF()">Fechar Leitura</button>
    </div>
    <div class="pdf-container-scroller" id="pdfRenderArea"></div>
  </div>

  <script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

  const dbName = "CosmicBloomDB";
  const storeName = "livros";
  let db, books = [], selectedStars = 0, selectedImage = "", pdfDataUrl = "", editId = null;

  const initDB = () => new Promise((resolve, reject) => {
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName, { keyPath: "id" });
    };
    request.onsuccess = (e) => { db = e.target.result; resolve(db); };
    request.onerror = (e) => reject("Erro ao abrir banco");
  });

  const getAllBooks = () => new Promise((resolve) => {
    const transaction = db.transaction([storeName], "readonly");
    const store = transaction.objectStore(storeName);
    const request = store.getAll();
    request.onsuccess = () => resolve(request.result || []);
  });

  const saveBookDB = (book) => new Promise((resolve) => {
    const transaction = db.transaction([storeName], "readwrite");
    const store = transaction.objectStore(storeName);
    store.put(book);
    transaction.oncomplete = () => resolve();
  });

  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById("modal");

    // Configura Botão Adicionar
    document.getElementById("addBtn").addEventListener("click", () => {
      editId = null; selectedStars = 0; selectedImage = ""; pdfDataUrl = "";
      document.getElementById("inputTitle").value = "";
      document.getElementById("inputPages").value = "";
      document.getElementById("inputYear").value = sessionStorage.getItem("ano_selecionado") || "2026";
      atualizarEstrelasVisual();
      modal.classList.add("show");
    });

    // Configura Botão Salvar
    document.getElementById("saveBook").addEventListener("click", async () => {
      const bookData = {
        id: editId || crypto.randomUUID(),
        title: document.getElementById("inputTitle").value || "Sem Título",
        pages: parseInt(document.getElementById("inputPages").value) || 0,
        year: parseInt(document.getElementById("inputYear").value) || 2026,
        status: document.getElementById("statusSelect").value,
        estrelas: selectedStars,
        favorito: editId ? (books.find(b => b.id === editId)?.favorito || false) : false,
        capa: selectedImage || "https://i.pinimg.com/736x/8d/a6/f3/8da6f3d9d43d3bfa24bdf88138b0051b.jpg",
        pdf: pdfDataUrl 
      };

      await saveBookDB(bookData);
      modal.classList.remove("show");
      atualizarInterface();
    });

    document.getElementById("closeModal").addEventListener("click", () => modal.classList.remove("show"));

    // Configura Estrelas
    document.querySelectorAll("#starsSelect span").forEach((s, i) => {
      s.onclick = () => {
        let val = i + 1;
        selectedStars = (selectedStars === val) ? val - 0.5 : ((selectedStars === val - 0.5) ? 0 : val);
        atualizarEstrelasVisual();
      };
    });

    initDB().then(() => atualizarInterface());
  });

  async function atualizarInterface() {
    books = await getAllBooks();
    renderBooks();
  }

  function atualizarEstrelasVisual() {
    document.querySelectorAll("#starsSelect span").forEach((s, i) => {
      let val = i + 1;
      s.classList.remove("selected", "half-selected");
      if (val <= Math.floor(selectedStars)) s.classList.add("selected");
      else if (val === Math.ceil(selectedStars) && selectedStars % 1 !== 0) s.classList.add("half-selected");
    });
  }

  async function abrirLeitorPDF(titulo, id) {
    document.getElementById("pdfViewerTitle").innerText = `Lendo: ${titulo}`;
    const area = document.getElementById("pdfRenderArea");
    area.innerHTML = "<p style='color:#fbc8d4; text-align:center; margin-top:40px;'>Carregando...</p>";
    document.getElementById("pdfViewer").classList.add("show");

    const livro = books.find(b => b.id === id);
    if (!livro || !livro.pdf) return;

    try {
      const base64 = livro.pdf.split(',')[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const pdf = await pdfjsLib.getDocument({data: bytes}).promise;
      area.innerHTML = "";
      for (let num = 1; num <= pdf.numPages; num++) {
        const page = await pdf.getPage(num);
        const viewport = page.getViewport({ scale: 1.3 });
        const canvas = document.createElement('canvas');
        canvas.className = "pdf-page-canvas";
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        area.appendChild(canvas);
        await page.render({ canvasContext: context, viewport: viewport }).promise;
      }
    } catch (err) { area.innerHTML = "<p style='color:red; text-align:center; margin-top:40px;'>Erro.</p>"; }
  }

  function fecharLeitorPDF() {
    document.getElementById("pdfViewer").classList.remove("show");
    document.getElementById("pdfRenderArea").innerHTML = "";
  }
</script>
</body>
</html>
