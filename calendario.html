<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Calendar ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-rose: #fcaec1;
      --soft-pink: #fbc8d4;
      --bg-overlay: rgba(58, 29, 33, 0.75);
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(251, 200, 212, 0.2);
      --text-light: #fff2f5;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                  url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2 { font-family: 'Playfair Display', serif; color: var(--soft-pink); }

    .sidebar {
      width: 250px; background: rgba(58, 29, 33, 0.4); backdrop-filter: blur(20px);
      border-right: 1px solid var(--card-border); padding: 30px 20px; position: fixed; height: 100vh;
    }
    
    .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; color: var(--soft-pink); font-size: 2.2rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px rgba(251, 200, 212, 0.3); }

    .nav-link { color: var(--text-light); text-decoration: none; padding: 14px; display: flex; align-items: center; gap: 10px; border-radius: 20px; margin-bottom: 10px; }
    .nav-link.active { background: var(--soft-pink); color: #3a1d21; font-weight: bold; }

    .main-content { margin-left: 250px; padding: 40px; flex: 1; display: flex; flex-direction: column; align-items: center; }

    .calendar-card {
      background: var(--card-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--card-border); padding: 30px;
      border-radius: 32px; width: 100%; max-width: 500px;
    }

    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    
    .btn-nav { background: rgba(255,255,255,0.1); border: 1px solid var(--card-border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; color: white; }

    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; }
    .day.marked { background: var(--primary-rose); color: #3a1d21; font-weight: bold; }

    .emoji-selector { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
    .emoji-chip { padding: 10px 20px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); font-size: 1.2rem; }
    .emoji-chip.selected { background: var(--soft-pink); color: #3a1d21; }

    /* Ajuste para centralizar o único card de estatística */
    .status-box { display: flex; justify-content: center; width: 100%; max-width: 500px; }
    .stat-mini { background: var(--card-bg); padding: 20px 40px; border-radius: 25px; text-align: center; border: 1px solid var(--card-border); }
    .stat-mini span { display: block; font-size: 0.8rem; color: var(--soft-pink); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-mini strong { font-size: 2rem; color: #fff; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 5px; }
      .main-content { margin-left: 0; padding: 20px 20px 100px; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand" onclick="window.location.href='anos.html'" style="cursor:pointer;">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link"><i>📚</i> Livros</a>
    <a href="desafios.html" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="calendario.html" class="nav-link active"><i>📅</i> Agenda</a>
   <a href="favoritos.html" class="nav-link"><i>💜</i> <span>Favoritos</span></a>
  <a href="bingo.html" class="nav-link"><i>🎯</i> <span>Bingo</span></a>
  <a href="cores.html" class="nav-link"><i>🌈</i> <span>Paleta</span></a>
  <a href="A-z.html" class="nav-link"><i>🅰️</i> <span>Desafio A-Z</span></a>
  <a href="roleta.html" class="nav-link"><i>📍</i> <span>Roleta</span></a>
</nav>

  <main class="main-content">
    <div class="calendar-card">
      <div class="calendar-header">
        <button class="btn-nav" id="prevMonth">◀</button>
        <h2 id="monthTitle">Janeiro 2026</h2>
        <button class="btn-nav" id="nextMonth">▶</button>
      </div>
      <div class="grid" id="calendarGrid"></div>
    </div>

    <div class="emoji-selector" id="emojiSelector">
      <div class="emoji-chip selected" data-emoji="✅">✅ Concluído</div>
      <div class="emoji-chip" data-emoji="❌">❌ Não lido</div>
      <div class="emoji-chip" data-emoji="📖">📖 Lido hoje</div>
    </div>

    <div class="status-box">
      <div class="stat-mini">
        <span>Dias lidos no mês</span>
        <strong id="countDays">0</strong>
      </div>
    </div>
  </main>

  <script>
    let currentDate = new Date();
    let selectedEmoji = "✅";
    let habitData = JSON.parse(localStorage.getItem("cosmic_calendar")) || {};

    const grid = document.getElementById("calendarGrid");
    const monthTitle = document.getElementById("monthTitle");

    document.querySelectorAll('.emoji-chip').forEach(chip => {
      chip.onclick = function() {
        document.querySelector('.emoji-chip.selected').classList.remove('selected');
        this.classList.add('selected');
        selectedEmoji = this.dataset.emoji;
      };
    });

    function render() {
      grid.innerHTML = "";
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();
      const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
      monthTitle.innerText = `${monthNames[month]} ${year}`;

      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement("div"));

      for (let d = 1; d <= lastDay; d++) {
        const dayKey = `${year}-${month}-${d}`;
        const dayDiv = document.createElement("div");
        dayDiv.className = "day" + (habitData[dayKey] ? " marked" : "");
        dayDiv.innerHTML = `${d}<small style="font-size:0.6rem; margin-top:4px;">${habitData[dayKey] || ""}</small>`;
        dayDiv.onclick = () => {
          habitData[dayKey] = habitData[dayKey] ? null : selectedEmoji;
          localStorage.setItem("cosmic_calendar", JSON.stringify(habitData));
          render();
        };
        grid.appendChild(dayDiv);
      }
      updateStats();
    }

    function updateStats() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const validReadings = Object.keys(habitData).filter(k => {
        return k.startsWith(`${year}-${month}-`) && 
               (habitData[k] === "✅" || habitData[k] === "📖");
      });
      document.getElementById("countDays").innerText = validReadings.length;
    }

    document.getElementById("prevMonth").onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); render(); };
    document.getElementById("nextMonth").onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); render(); };
    render();
  </script>
</body>
</html>
