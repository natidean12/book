<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icons/capa-coquette.png">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <title>Cosmic Book • Biblioteca ✨</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-rose: #fcaec1;
      --soft-pink: #fbc8d4;
      --vintage-gold: #cca05a;
      --bg-overlay: rgba(64, 36, 41, 0.55); /* Filtro romântico meia força */
      --card-bg: rgba(251, 200, 212, 0.22); /* Vidro fosco rosado super delicado */
      --card-border: rgba(204, 160, 90, 0.35); /* Bordas em dourado vintage */
      --text-dark-rose: #3a1d21; /* Tom marrom-rosado bem escuro para leitura */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-dark-rose);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      
      /* A MESMA IMAGEM DE FUNDO OFICIAL */
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg");
      background-size: cover; 
      background-position: center;
    }

    .header-selecao { text-align: center; margin-bottom: 45px; }
    
    .header-selecao h1 {
      font-family: 'Playfair Display', serif; 
      font-style: italic; 
      font-size: 2.8rem;
      color: var(--text-dark-rose); 
      margin: 0;
      text-shadow: 0 2px 10px rgba(251, 200, 212, 0.4);
    }
    
    .header-selecao p { 
      font-weight: 400; 
      opacity: 0.9; 
      margin-top: 8px; 
      color: var(--vintage-gold);
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    .grid-anos {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 25px; width: 90%; max-width: 480px;
    }

    .card-ano {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(15px); /* Desfoque de vidro da Apple */
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px; 
      padding: 35px 20px;
      text-align: center; 
      cursor: pointer;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 32px 0 rgba(64, 36, 41, 0.12);
    }

    .card-ano:active, .card-ano:hover {
      transform: scale(1.04);
      border-color: var(--vintage-gold);
      background: rgba(251, 200, 212, 0.35); 
      box-shadow: 0 0 25px rgba(252, 174, 193, 0.4);
    }

    .card-ano h2 { 
      font-size: 2.4rem; 
      margin: 0; 
      color: var(--text-dark-rose);
      font-weight: 700;
    }
    
    .card-ano p { 
      font-size: 0.85rem; 
      color: var(--vintage-gold); 
      font-weight: 600;
      margin: 8px 0 0 0; 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
    }
  </style>
</head>
<body>

  <div class="header-selecao">
    <h1>Memórias Literárias</h1>
    <p>Seu espaço sagrado para registrar cada história</p>
  </div>

  <div class="grid-anos">
    <div class="card-ano" onclick="selecionarAno(2025)">
      <h2>2025</h2>
      <p>Histórico 📜</p>
    </div>

    <div class="card-ano" onclick="selecionarAno(2026)">
      <h2>2026</h2>
      <p>Atual 🌸</p>
    </div>
  </div>

  <script>
    function selecionarAno(ano) {
      sessionStorage.setItem("ano_selecionado", ano);
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
