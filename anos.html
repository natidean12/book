<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icons/capa-coquette.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cosmic Bloom">
  <title>Cosmic Book • Seleção de Anos ✨</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght=0,700;1,700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    :root {
      --primary-rose: #fcaec1;
      --soft-pink: #fbc8d4;
      --vintage-gold: #cca05a;
      --bg-overlay: rgba(58, 29, 33, 0.65); 
      --card-bg: rgba(255, 255, 255, 0.08); 
      --card-border: rgba(251, 200, 212, 0.2); 
      --text-light: #fff2f5; 
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text-light);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: 
        linear-gradient(var(--bg-overlay), var(--bg-overlay)),
        url("https://i.pinimg.com/1200x/1d/72/41/1d72416e266789afa33c189c365ded82.jpg") no-repeat center / cover;
      background-attachment: fixed;
    }

    .header-selecao { text-align: center; margin-bottom: 45px; padding: 0 20px; }
    .header-selecao h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 2.8rem; color: var(--soft-pink); margin: 0; text-shadow: 0 2px 15px rgba(251, 200, 212, 0.3); }
    .header-selecao p { font-weight: 300; opacity: 0.9; margin-top: 8px; color: var(--text-light); font-size: 1rem; letter-spacing: 0.5px; }

    .grid-anos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 90%; max-width: 480px; }

    .card-ano {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 24px; padding: 35px 20px; text-align: center; cursor: pointer;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s, background 0.3s;
      box-shadow: 0 8px 32px 0 rgba(58, 29, 33, 0.3);
    }

    .card-ano:active { transform: scale(0.98); background: rgba(251, 200, 212, 0.15); }

    .card-ano h2 { font-size: 2.4rem; margin: 0; color: #ffffff; font-weight: 700; }
    .card-ano p { font-size: 0.85rem; color: var(--soft-pink); font-weight: 600; margin: 8px 0 0 0; text-transform: uppercase; letter-spacing: 1.5px; }
    .card-ano.atual p { color: var(--vintage-gold); }
  </style>
</head>
<body>

  <div class="header-selecao">
    <h1>Memórias Literárias</h1>
    <p>Seu espaço sagrado para registrar cada história</p>
  </div>

  <div class="grid-anos" id="gridAnos"></div>

  <script>
    const anoAtual = new Date().getFullYear();

    // MÁGICA AQUI: Conecta no banco de dados IndexedDB para achar o livro de 2024!
    function carregarAnosDoBanco() {
      const request = indexedDB.open("CosmicBloomDB", 1);
      
      request.onsuccess = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("livros")) {
          renderizarTela([]);
          return;
        }
        
        const transaction = db.transaction(["livros"], "readonly");
        const store = transaction.objectStore("livros");
        const getAll = store.getAll();

        getAll.onsuccess = () => {
          const livros = getAll.result || [];
          // Extrai os anos de todos os livros salvos no banco de dados
          let listaAnos = livros.map(l => parseInt(l.year)).filter(Boolean);
          renderizarTela(listaAnos);
        };
      };
      
      request.onerror = () => renderizarTela([]);
    }

    function renderizarTela(listaAnos) {
      const grid = document.getElementById("gridAnos");
      grid.innerHTML = "";

      // Remove anos duplicados
      listaAnos = [...new Set(listaAnos)];

      // Garante que os anos padrão (2025 e 2026) apareçam mesmo se não tiver livros neles ainda
      if (!listaAnos.includes(2025)) listaAnos.push(2025);
      if (!listaAnos.includes(anoAtual)) listaAnos.push(anoAtual);

      // Organiza do ano mais novo para o mais antigo (2026, 2025, 2024...)
      listaAnos.sort((a, b) => b - a);

      listaAnos.forEach(ano => {
        const card = document.createElement("div");
        if (ano === anoAtual) {
          card.className = "card-ano atual";
          card.innerHTML = `<h2>${ano}</h2><p>Atual 🌸</p>`;
        } else {
          card.className = "card-ano";
          card.innerHTML = `<h2>${ano}</h2><p>Histórico 📜</p>`;
        }
        
        card.onclick = () => {
          sessionStorage.setItem("ano_selecionado", ano);
          window.location.href = "livros.html"; // Vai para a tela de livros filtrando por esse ano
        };
        grid.appendChild(card);
      });
    }

    window.addEventListener("DOMContentLoaded", carregarAnosDoBanco);
  </script>
</body>
</html>
