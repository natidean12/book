<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cosmic Bloom Journal ✨</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* MANTENDO 100% A ESTÉTICA ROSA COQUETTE/VINTAGE QUE VOCÊ AMA */
    :root {
      --coquette-pink: #fbc8d4;
      --coquette-light: #fff5f6;
      --vintage-gold: #cca05a;
      --text-main: #3a1d21;
      --text-muted: #8c6267;
      --glass-card: rgba(255, 255, 255, 0.6);
      --border-line: rgba(204, 160, 90, 0.25);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      color: var(--text-main);
      background: linear-gradient(135deg, var(--coquette-light) 0%, var(--coquette-pink) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
    }

    h1, h2, .nav-brand { font-family: 'Playfair Display', serif; font-style: italic; color: var(--text-main); }

    /* MENU LATERAL COQUETTE COM TODAS AS ABAS */
    .sidebar {
      width: 260px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-line);
      display: flex; flex-direction: column; padding: 30px 15px;
      position: fixed; height: 100vh; z-index: 1000;
    }
    .nav-brand { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 35px; }
    
    .nav-link {
      color: var(--text-muted); text-decoration: none; padding: 12px 18px;
      border-radius: 20px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
      font-weight: 500; font-size: 0.9rem; transition: all 0.3s ease;
    }
    .nav-link:hover { background: rgba(255, 255, 255, 0.3); color: var(--text-main); }
    .nav-link.active {
      background: var(--text-main); color: white;
      box-shadow: 0 6px 15px rgba(58, 29, 33, 0.15);
    }

    /* LAYOUT PRINCIPAL */
    .main-content { margin-left: 260px; padding: 40px; flex: 1; }
    
    /* TOP BAR COM O PAJÔMETRO ROSA */
    .top-bar {
      display: flex; justify-content: flex-end; align-items: center;
      padding-bottom: 30px; position: sticky; top: 0; z-index: 900;
    }
    .pages-badge {
      background: #fff; color: var(--text-main);
      padding: 10px 22px; border-radius: 50px; font-weight: 600; font-size: 0.9rem;
      border: 1px solid var(--vintage-gold);
      box-shadow: 0 6px 15px rgba(204, 160, 90, 0.15);
      display: flex; align-items: center; gap: 8px;
    }

    /* MATRIZ DE ESTATÍSTICAS COQUETTE */
    .stats-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px; margin-bottom: 40px;
    }
    .stat-card {
      background: var(--glass-card); border: 1px solid var(--border-line);
      padding: 22px; border-radius: 24px; text-align: center;
      box-shadow: 0 10px 25px rgba(58, 29, 33, 0.02);
    }
    .stat-card small { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .stat-card strong { font-size: 2rem; font-weight: 700; color: var(--vintage-gold); }

    .year-header {
      font-size: 2rem; margin: 45px 0 25px; font-weight: 600;
      display: flex; align-items: center; gap: 20px;
    }
    .year-header::after { content: ""; flex: 1; height: 1px; background: var(--border-line); }

    /* DESIGN EM FEED DE DIÁRIO / REESTRUTURAÇÃO EM LINHAS */
    .journal-timeline { display: flex; flex-direction: column; gap: 22px; }

    .journal-row {
      background: var(--glass-card); border: 1px solid var(--border-line);
      border-radius: 24px; padding: 25px; display: flex; gap: 30px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(58, 29, 33, 0.03); transition: transform 0.3s;
    }
    .journal-row:hover { transform: translateY(-2px); }

    .cover-container { width: 120px; flex-shrink: 0; cursor: pointer; }
    .book-cover {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      border-radius: 14px; box-shadow: 0 8px 20px rgba(58, 29, 33, 0.12);
      border: 1px solid rgba(204, 160, 90, 0.2); background-color: #ebdcd5;
    }

    .book-details-box { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .book-meta-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .book-title-text { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text-main); font-weight: 600; }
    .book-author-text { font-size: 0.9rem; color: var(--text-muted); font-style: italic; margin-top: 2px; }
    
    .badge-status {
      padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; background: #fff; border: 1px solid var(--border-line);
    }
    .status-lido { color: #cca05a; background: #fffcf5; }
    .status-lendo { color: #fcaec1; background: #fff5f6; }
    .status-quero { color: #8c6267; background: #f0e6e8; }

    .book-middle-row { display: flex; gap: 30px; margin: 12px 0; align-items: center; }
    .info-stats-mini { font-size: 0.85rem; color: var(--text-muted); }
    .info-stats-mini strong { color: var(--text-main); font-size: 1rem; }
    
    .stars-display { color: var(--vintage-gold); font-size: 1.1rem; letter-spacing: 2px; }
    .half-star { position: relative; display: inline-block; color: rgba(58, 29, 33, 0.1); }
    .half-star::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    /* BOTÕES INTEGRADOS LINDOS */
    .action-row-end { display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid rgba(204,160,90,0.1); padding-top: 12px; }
    .action-row-end button {
      background: white; border: 1px solid var(--border-line); padding: 8px 16px;
      border-radius: 14px; cursor: pointer; color: var(--text-main); font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .action-row-end button:hover { border-color: var(--vintage-gold); background: var(--coquette-light); }
    .read-pdf-btn { background: var(--text-main) !important; color: white !important; border-color: var(--vintage-gold) !important; }
    .del-btn-line.warning { background: #ff5e5e !important; color: white !important; border-color: #ff5e5e !important; }

    /* BOTÃO FLUTUANTE ADICIONAR */
    #addBtn {
      position: fixed; bottom: 35px; right: 35px; width: 60px; height: 60px; border-radius: 50%;
      background: var(--text-main); color: white; border: 2px solid var(--vintage-gold);
      font-size: 2rem; cursor: pointer; z-index: 1100; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 25px rgba(58, 29, 33, 0.25);
    }

    /* MODAL DO FORMULÁRIO */
    .modal {
      position: fixed; inset: 0; background: rgba(58, 29, 33, 0.3);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      display: flex; align-items: center; justify-content: center; z-index: 2000;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .modal.show { opacity: 1; visibility: visible; }
    .modal-content {
      background: #fffbfa; border: 2px solid var(--vintage-gold); padding: 30px;
      border-radius: 28px; width: 90%; max-width: 460px; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-content h2 { text-align: center; margin-bottom: 15px; font-style: italic; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    
    input, select {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid var(--border-line); background: white; color: var(--text-main); font-family: 'Montserrat', sans-serif; outline: none;
    }

    #starsSelect { text-align: center; font-size: 2.8rem; margin: 5px 0; }
    #starsSelect span { cursor: pointer; color: rgba(58, 29, 33, 0.1); position: relative; display: inline-block; }
    #starsSelect span.selected { color: var(--vintage-gold); }
    #starsSelect span.half-selected::before { content: "★"; position: absolute; left: 0; width: 50%; overflow: hidden; color: var(--vintage-gold); }

    .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
    .modal-buttons button { flex: 1; padding: 14px; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; }
    #saveBook { background: var(--text-main); color: white; border: 1px solid var(--vintage-gold); }
    #closeModal { background: rgba(58, 29, 33, 0.06); color: var(--text-main); }

    .loading-cover-text { font-size: 0.8rem; color: #cca05a; display: none; text-align: center; margin-top: 4px; font-weight: 600; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; padding: 0; overflow-x: auto; scrollbar-width: none; }
      .sidebar::-webkit-scrollbar { display: none; }
      .nav-brand { display: none; }
      .nav-link { margin-bottom: 0; border-radius: 0; padding: 10px 20px; white-space: nowrap; height: 100%; align-items: center; }
      .main-content { margin-left: 0; padding: 20px 15px 100px; }
      .journal-row { flex-direction: column; gap: 15px; padding: 20px; }
      .cover-container { width: 100px; margin: 0 auto; }
      .action-row-end { justify-content: space-around; }
      #addBtn { bottom: 85px; right: 15px; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="nav-brand">Cosmic Bloom</div>
    <a href="livros.html" class="nav-link active"><i>📚</i> Livros</a>
    <a href="challenge.html" class="nav-link"><i>🏆</i> Desafios</a>
    <a href="calendario.html" class="nav-link"><i>📅</i> Agenda</a>
    <a href="favoritos.html" class="nav-link"><i>💜</i> Favoritos</a>
    <a href="bingo.html" class="nav-link"><i>🎯</i> Bingo Literário</a>
    <a href="cores.html" class="nav-link"><i>🌈</i> Paleta Literária</a>
    <a href="A-z.html" class="nav-link"><i>🅰️</i> Desafio A-Z</a>
    <a href="roleta.html" class="nav-link"><i>📍</i> Roleta</a>
  </nav>

  <main class="main-content">
    <div class="top-bar">
      <div class="pages-badge">✨ <span id="totalPgs">0</span> pgs lidas</div>
    </div>

    <div class="stats-container">
      <div class="stat-card"><small>Livros Lidos</small><strong id="stLido">0</strong></div>
      <div class="stat-card"><small>Lendo Agora</small><strong id="stLendo">0</strong></div>
      <div class="stat-card"><small>Favoritos</small><strong id="stFav">0</strong></div>
      <div class="stat-card"><small>Média Estrelas</small><strong id="stMedia">0.0</strong></div>
    </div>

    <div id="yearContainers"></div>
  </main>

  <button id="addBtn">＋</button>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Novo Registro Cósmico</h2>
      
      <div class="form-group">
        <label>Anexar Livro em PDF (Capa Automática)</label>
        <input type="file" id="pdfFile" accept=".pdf">
        <div class="loading-cover-text" id="loadCoverText">✨ Extraindo a capa real do PDF...</div>
      </div>

      <div class="form-group">
        <label>Ou prefere subir uma Imagem/Foto manual? 📸</label>
        <input type="file" id="bookFile" accept="image/*">
      </div>

      <div class="form-group"><input type="text" id="inputTitle" placeholder="Título do Livro"></div>
      <div class="form-group"><input type="text" id="inputAutor" placeholder="Autor(a)"></div>
      <div class="form-group"><input type="number" id="inputPages" placeholder="Total de Páginas"></div>
      <div class="form-group"><input type="number" id="inputYear" placeholder="Ano de Leitura" value="2026"></div>
      
      <div class="form-group">
        <select id="statusSelect">
          <option value="lido">📕 Já li (Concluído)</option>
          <option value="lendo">📖 Lendo Agora</option>
          <option value="quero">📘 Quero Ler</option>
        </select>
      </div>
      
      <div id="starsSelect">
        <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
      </div>
      
      <div class="modal-buttons">
        <button id="saveBook">✨ Salvar no Cosmos</button>
        <button id="closeModal">Voltar</button>
      </div>
    </div>
  </div>

  <canvas id="pdfCanvas" style="display: none;"></canvas>

  <script>
    // --- SUAS CONFIGURAÇÕES REAIS DO FIREBASE ---
    // Substitua abaixo com as credenciais do seu projeto Firebase!
    const firebaseConfig = {
      apiKey: "SUA_API_KEY_AQUI",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO_ID",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let books = []; let selectedStars = 0; let selectedImage = ""; let selectedPdfBase64 = ""; let editId = null;

    // ESCUTA EM TEMPO REAL: Tudo que muda no iPad atualiza na hora no celular!
    function carregarDadosDoFirebase() {
      db.collection("livros").onSnapshot((snapshot) => {
        books = [];
        snapshot.forEach((doc) => {
          books.push({ id: doc.id, ...doc.data() });
        });
        renderBooksDashboard();
      });
    }

    async function salvarNoFirebase(id, bookData) {
      await db.collection("livros").doc(id).set(bookData, { merge: true });
    }

    async function deletarNoFirebase(id) {
      await db.collection("livros").doc(id).delete();
    }

    function renderStarsHtml(val) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(val)) html += '<span>★</span>';
        else if (i === Math.ceil(val) && val % 1 !== 0) html += '<span class="half-star">★</span>';
        else html += '<span style="color:rgba(58,29,33,0.1)">★</span>';
      }
      return html;
    }

    function abrirPDF(base64Data, titulo) {
      const arr = base64Data.split(','); const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]); let n = bstr.length; const u8arr = new Uint8Array(n);
      while(n--){ u8arr[n] = bstr.charCodeAt(n); }
      const fileURL = URL.createObjectURL(new Blob([u8arr], {type:mime}));
      const win = window.open();
      if(win) win.document.write(`<title>${titulo}</title><body style="margin:0;"><embed src="${fileURL}" type="application/pdf" width="100%" height="100%"></body>`);
      else window.location.href = fileURL;
    }

    function renderBooksDashboard() {
      const container = document.getElementById("yearContainers");
      if(!container) return; container.innerHTML = "";
      
      const lidos = books.filter(b => b.status === 'lido');
      document.getElementById("totalPgs").innerText = lidos.reduce((acc, b) => acc + (parseInt(b.pages) || 0), 0).toLocaleString('pt-BR');
      document.getElementById("stLido").innerText = lidos.length;
      document.getElementById("stLendo").innerText = books.filter(b => b.status === 'lendo').length;
      document.getElementById("stFav").innerText = books.filter(b => b.favorito).length;
      
      const media = lidos.length ? (lidos.reduce((a,b) => a + (b.estrelas || 0), 0) / lidos.length).toFixed(1) : "0.0";
      document.getElementById("stMedia").innerText = media;

      const years = [...new Set(books.map(b => b.year || 2026))].sort((a,b) => b - a);
      
      years.forEach(year => {
        const section = document.createElement("div");
        section.innerHTML = `<h2 class="year-header">${year}</h2><div class="journal-timeline" id="grid-${year}"></div>`;
        container.appendChild(section);
        
        books.filter(b => (b.year || 2026) == year).forEach(book => {
          const row = document.createElement("div");
          row.className = "journal-row";
          
          const capaImg = book.capa || 'https://i.ibb.co/C07F1kL/placeholder-book-cover.png';

          row.innerHTML = `
            <div class="cover-container"><img src="${capaImg}" class="book-cover" loading="lazy"></div>
            <div class="book-details-box">
              <div>
                <div class="book-meta-top">
                  <div>
                    <h3 class="book-title-text">${book.title || 'Sem Título'}</h3>
                    <p class="book-author-text">por ${book.autor || 'Desconhecido'}</p>
                  </div>
                  <span class="badge-status status-${book.status}">${book.status}</span>
                </div>
                <div class="book-middle-row">
                  <div class="info-stats-mini">Volume: <strong>${book.pages} pgs</strong></div>
                  <div class="stars-display">${renderStarsHtml(book.estrelas || 0)}</div>
                </div>
              </div>
              <div class="action-row-end">
                ${book.pdfData ? `<button class="read-pdf-btn">📖 Ler PDF</button>` : ''}
                <button class="fav-btn">${book.favorito ? "💜" : "🤍"}</button>
                <button class="edit-btn">✏️ Editar</button>
                <button class="del-btn-line">🗑️ Apagar</button>
              </div>
            </div>
          `;

          if(book.pdfData) {
            row.querySelector(".read-pdf-btn").onclick = () => abrirPDF(book.pdfData, book.title);
            row.querySelector(".cover-container").onclick = () => abrirPDF(book.pdfData, book.title);
          }
          
          row.querySelector(".fav-btn").onclick = async () => { 
            book.favorito = !book.favorito; 
            await salvarNoFirebase(book.id, { favorito: book.favorito });
          };

          row.querySelector(".del-btn-line").onclick = async function() {
            if (!this.classList.contains("warning")) {
              this.classList.add("warning"); setTimeout(() => this.classList.remove("warning"), 2000);
            } else {
              await deletarNoFirebase(book.id);
            }
          };

          row.querySelector(".edit-btn").onclick = () => {
            editId = book.id; selectedStars = book.estrelas; selectedImage = book.capa; selectedPdfBase64 = book.pdfData || "";
            document.getElementById("inputTitle").value = book.title;
            document.getElementById("inputAutor").value = book.autor || "";
            document.getElementById("inputPages").value = book.pages;
            document.getElementById("inputYear").value = book.year;
            document.getElementById("statusSelect").value = book.status;
            atualizarEstrelasVisual();
            document.getElementById("modal").classList.add("show");
          };

          document.getElementById(`grid-${year}`).appendChild(row);
        });
      });
    }

    // COMPRESSÃO DE IMAGENS ENVIADAS MANUALMENTE
    function comprimirImagem(file, callback) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas'); const max_size = 350;
          let width = img.width; let height = img.height;
          if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
          else { if (height > max_size) { width *= max_size / height; height = max_size; } }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          callback(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById("bookFile").onchange = e => {
      const file = e.target.files[0];
      if (file) comprimirImagem(file, (base64) => { selectedImage = base64; });
    };

    // PROCESSAMENTO DO ARQUIVO PDF E EXTRAÇÃO DA CAPA
    document.getElementById("pdfFile").onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      document.getElementById("loadCoverText").style.display = "block";

      const reader = new FileReader();
      reader.onload = function(event) {
        selectedPdfBase64 = event.target.result;
        const fileReaderBuffer = new FileReader();
        fileReaderBuffer.onload = function() {
          pdfjsLib.getDocument({ data: this.result }).promise.then(function(pdf) {
            document.getElementById("inputPages").value = pdf.numPages;
            pdf.getPage(1).then(function(page) {
              const canvas = document.getElementById('pdfCanvas'); const context = canvas.getContext('2d');
              const viewport = page.getViewport({ scale: 1.0 });
              canvas.height = viewport.height; canvas.width = viewport.width;
              page.render({ canvasContext: context, viewport: viewport }).promise.then(function() {
                selectedImage = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById("loadCoverText").innerText = "✨ Capa do PDF extraída!";
                setTimeout(() => { document.getElementById("loadCoverText").style.display = "none"; }, 1500);
              });
            });
          });
        };
        fileReaderBuffer.readAsArrayBuffer(file);
      };
      reader.readAsDataURL(file);
    };

    // SISTEMA DE ESTRELAS
    document.querySelectorAll("#starsSelect span").forEach((s, i) => {
      s.onclick = () => {
        let val = i + 1;
        if (selectedStars === val) selectedStars = val - 0.5;
        else if (selectedStars === (val - 0.5)) selectedStars = 0;
        else selectedStars = val;
        atualizarEstrelasVisual();
      };
    });

    function atualizarEstrelasVisual() {
      document.querySelectorAll("#starsSelect span").forEach((s, i) => {
        let val = i + 1; s.classList.remove("selected", "half-selected");
        if (val <= Math.floor(selectedStars)) s.classList.add("selected");
        else if (val === Math.ceil(selectedStars) && selectedStars % 1 !== 0) s.classList.add("half-selected");
      });
    }

    document.getElementById("addBtn").onclick = () => {
      editId = null; selectedStars = 0; selectedImage = ""; selectedPdfBase64 = "";
      document.getElementById("inputTitle").value = ""; document.getElementById("inputAutor").value = "";
      document.getElementById("inputPages").value = ""; document.getElementById("pdfFile").value = "";
      document.getElementById("bookFile").value = ""; document.getElementById("loadCoverText").innerText = "✨ Extraindo a capa real do PDF...";
      document.getElementById("loadCoverText").style.display = "none";
      atualizarEstrelasVisual(); document.getElementById("modal").classList.add("show");
    };

    document.getElementById("closeModal").onclick = () => document.getElementById("modal").classList.remove("show");

    document.getElementById("saveBook").onclick = async () => {
      const id = editId || crypto.randomUUID();
      const bookData = {
        title: document.getElementById("inputTitle").value || "Sem Título",
        autor: document.getElementById("inputAutor").value || "Desconhecido",
        pages: parseInt(document.getElementById("inputPages").value) || 0,
        year: parseInt(document.getElementById("inputYear").value) || 2026,
        status: document.getElementById("statusSelect").value,
        estrelas: selectedStars,
        favorito: editId ? books.find(b => b.id === editId).favorito : false,
        capa: selectedImage,
        pdfData: selectedPdfBase64
      };
      
      await salvarNoFirebase(id, bookData);
      document.getElementById("modal").classList.remove("show");
    };

    // Inicia a escuta automática com o Firebase cloud
    carregarDadosDoFirebase();
  </script>
</body>
</html>
